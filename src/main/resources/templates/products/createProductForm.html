<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Product Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .container { max-width: 550px; margin-top: 80px; }
    .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
    .card-header { background-color: #0d6efd; color: white; border-radius: 1rem 1rem 0 0 !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="card-header py-3 text-center">
      <h4 class="mb-0 fw-bold">새 상품 등록</h4>
    </div>
    <div class="card-body p-4">
      <form th:action="@{/products/new}" th:object="${productForm}" method="post">
        <div class="mb-3">
          <label th:for="productName" class="form-label fw-bold text-secondary">상품명</label>
          <input type="text" th:field="*{productName}" class="form-control form-control-lg" placeholder="상품 이름을 입력하세요">
        </div>

        <div class="mb-4">
          <label th:for="productPrice" class="form-label fw-bold text-secondary">상품 가격</label>
          <div class="input-group">
            <span class="input-group-text">₩</span>
            <input type="number" th:field="*{productPrice}" class="form-control form-control-lg" placeholder="가격을 입력하세요">
          </div>
        </div>

        <div class="mb-4">
          <label th:for="productCount" class="form-label fw-bold text-secondary">재고수</label>
          <div class="input-group">
            <span class="input-group-text">₩</span>
            <input type="number" th:field="*{productCount}" class="form-control form-control-lg" placeholder="상품수량을 입력하세요">
          </div>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg fw-bold">등록 완료</button>
          <a href="/" class="btn btn-light">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
