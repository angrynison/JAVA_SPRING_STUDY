<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 800px; margin-top: 50px; }
        .jumbotron { padding: 4rem 2rem; background-color: #f8f9fa; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="jumbotron text-center">
        <h1 class="display-4 fw-bold text-primary mb-4">Hello Spring Shop</h1>
        <p class="lead mb-5 text-secondary">회원 관리와 주문 시스템을 위한 대시보드입니다.</p>
        <hr class="my-4">
        <div class="row g-3">
            <div class="col-md-6">
                <a class="btn btn-lg btn-primary w-100 py-3" th:href="@{/members/createMembers}">회원 가입</a>
            </div>
            <div class="col-md-6">
                <a class="btn btn-lg btn-outline-primary w-100 py-3" th:href="@{/memberList}">회원 목록</a>
            </div>
            <div class="col-md-6">
                <a class="btn btn-lg btn-success w-100 py-3" th:href="@{/orders/createOrders}">상품 주문</a>
            </div>
            <div class="col-md-6">
                <a class="btn btn-lg btn-outline-success w-100 py-3" th:href="@{/orderList}">주문 내역</a>
            </div>
            <div class="col-md-6">
                <a class="btn btn-lg btn-outline-success w-100 py-3" th:href="@{/products/createProduct}">제품 등록</a>
            </div>
            <div class="col-md-6">
                <a class="btn btn-lg btn-outline-success w-100 py-3" th:href="@{/productList}">제품 내역</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
