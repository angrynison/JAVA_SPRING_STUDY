<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container" style="max-width: 600px; margin-top: 50px;">
  <div class="card shadow border-success">
    <div class="card-header bg-success text-white">
      <h3 class="mb-0">상품 주문</h3>
    </div>
    <div class="card-body">

      <div th:if="${message}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${message}">에러 메시지 노출 영역</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <form th:action="@{/order_create}" method="post">
        <div class="mb-3">
          <label for="memberId" class="form-label fw-bold">주문 회원 ID</label>
          <input type="number" id="memberId" name="memberId" class="form-control" placeholder="회원 번호를 입력하세요">
        </div>
        <div class="mb-3">
          <label for="productId" class="form-label fw-bold">상품명</label>
          <select name="productId" id="productId" class="form-select">
            <option value="">상품을 선택하세요</option>
            <option th:each="product : ${products}"
                    th:value="${product.productId}"
                    th:text="${product.productName} + ' (재고: ' + ${product.productCount} + '개) - ' + ${product.itemPrice} + '원'">
            </option>
          </select>
        </div>
        <div class="mb-4">
          <label for="orderCount" class="form-label fw-bold">주문 수량</label>
          <input type="number" id="orderCount" name="orderCount" class="form-control" min="1" value="1">
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success btn-lg">주문하기</button>
          <a href="/static" class="btn btn-light">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
