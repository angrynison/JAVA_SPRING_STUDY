<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; max-width: 1000px; }
        .table shadow-sm { background-color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">주문 내역</h2>
        <a href="/" class="btn btn-outline-secondary">홈으로 이동</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="py-3 px-4">회원 ID</th>
                        <th class="py-3 px-4">상품명</th>
                        <th class="py-3 px-4 text-end">상품 가격</th>
                        <th class="py-3 px-4 text-end text-warning">할인 금액</th>
                        <th class="py-3 px-4 text-end fw-bold">최종 결제 금액</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td class="py-3 px-4" th:text="${order.memberId}">1</td>
                        <td class="py-3 px-4 fw-bold" th:text="${order.productId}">상품명</td>
                        <td class="py-3 px-4 text-end" th:text="${order.productPrice} + '원'">10000원</td>
                        <td class="py-3 px-4 text-end text-danger" th:text="'-' + ${order.discountPrice} + '원'">-1000원</td>
                        <td class="py-3 px-4 text-end fw-bold text-primary"
                            th:text="${order.productPrice - order.discountPrice} + '원'">9000원</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="5" class="py-5 text-center text-muted">주문 내역이 존재하지 않습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
