<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container" style="margin-top: 50px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">회원 목록</h2>
    <a href="/" class="btn btn-outline-secondary">홈으로</a>
  </div>
  <div class="table-responsive bg-white shadow-sm rounded">
    <table class="table table-hover mb-0">
      <thead class="table-dark">
      <tr>
        <th class="py-3 px-4">#</th>
        <th class="py-3 px-4">이름</th>
        <th class="py-3 px-4">등급</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="member : ${members}">
        <td class="py-3 px-4" th:text="${member.id}">1</td>
        <td class="py-3 px-4" th:text="${member.name}">홍길동</td>
        <td class="py-3 px-4">
                    <span th:text="${member.grade}"
                          th:class="${member.grade.name() == 'VIP'} ? 'badge bg-warning text-dark' : 'badge bg-secondary'">
                    </span>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
