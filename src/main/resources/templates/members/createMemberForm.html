<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container" style="max-width: 600px; margin-top: 50px;">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">회원 가입</h3>
    </div>
    <div class="card-body">
      <form th:action="@{/members/new}" th:object="${memberForm}" method="post">
        <div class="mb-4">
          <label th:for="memberName" class="form-label fw-bold">이름</label>
          <input type="text" th:field="*{memberName}" class="form-control" placeholder="이름을 입력하세요">
        </div>
        <div class="mb-4">
          <label th:for="grade" class="form-label fw-bold">등급 선택</label>
          <select th:field="*{grade}" class="form-select">
            <option value="">등급을 선택하세요</option>
            <option th:value="BASIC">BASIC</option>
            <option th:value="VIP">VIP</option>
          </select>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg">가입 완료</button>
          <a href="/static" class="btn btn-light">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
